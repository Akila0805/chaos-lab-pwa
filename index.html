<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0a1a3a,#0d2b6b,#0f3c91);
  color:white;
}
section{display:none;padding:20px;min-height:100vh;}
.active{display:block;}
h1,h2{letter-spacing:2px;}
button{
  background:#ffd700;
  border:none;
  padding:10px 20px;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}
button:hover{background:#ffea00;}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}
.card{
  background:rgba(255,255,255,0.12);
  border-radius:20px;
  padding:10px;
  backdrop-filter:blur(10px);
  transition:.3s;
}
.card:hover{transform:scale(1.05);}
.card img{
  width:100%;
  height:150px;
  object-fit:contain;
  border-radius:15px;
  background:white;
}
.price{color:#ffd700;font-weight:bold;}
input{
  padding:10px;
  border-radius:20px;
  border:none;
  width:250px;
}
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#08162f;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:10;
}
</style>

<body>

<!-- SPLASH -->
<section id="splash" class="active">

</section>

<section id="offers">

  <div class="grid" id="productGrid"></div>
</section>

<!-- CART -->
<section id="cart">

  <div id="cartItems"></div>
  <h3>Total: ₹<span id="total">0</span></h3>
  <button onclick="go('checkout')">Checkout</button>
</section>

<!-- CHECKOUT -->
<section id="checkout">

  <input placeholder="Address"><br><br>
  <input placeholder="Phone"><br><br>
  <input placeholder="Email"><br><br>
  <button onclick="go('done')">Place Order</button>
</section>

<!-- DONE -->
<section id="done">

</section>

<div class="nav">

let cart=[];
const grid=document.getElementById("productGrid");

function render(list){
 grid.innerHTML="";
 list.forEach(p=>{
  grid.innerHTML+=`<div class="card">
    <img src="${p.img}">
    <h4>${p.name}</h4>
    <p class="price">₹${p.price}</p>
    <button onclick="add('${p.name}',${p.price})">Add to Cart</button>
  </div>`;
 });
}
render(products);

function add(n,p){
 cart.push({n,p});
 document.getElementById("total").innerText=cart.reduce((s,i)=>s+i.p,0);
}

function go(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 if(id==="cart"){
  document.getElementById("cartItems").innerHTML=
   cart.map(i=>`<p>${i.n} – ₹${i.p}</p>`).join("");
 }
}

function search(v){
 render(products.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())));
}

setTimeout(()=>go("offers"),6000);
</script>
